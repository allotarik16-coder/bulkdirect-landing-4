<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BulkDirect III — Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303; /* Noir absolu premium */
            --card-bg: #0a0a0c; /* Noir de surface */
            --accent: #ffffff; /* Pureté du blanc pour l'action */
            --text-main: #f4f4f5; /* Gris très clair texturé */
            --text-muted: #a1a1aa; /* Gris zinc pour la hiérarchie */
            --border: #27272a; /* Bordures subtiles style shadcn */
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtilité du fond : un léger dégradé linéaire plutôt que des gros halos flashys */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(800px circle at 50% -100px, rgba(255,255,255,0.03), transparent);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(3, 3, 3, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 1rem 2rem;
        }

        nav .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.02em; text-transform: uppercase; }

        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .hero-content { max-width: 580px; width: 100%; text-align: center; margin-top: 40px; }

        .badge {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-main);
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.15;
            margin-bottom: 1.2rem;
            color: #ffffff;
        }

        h1 span {
            color: var(--text-muted);
            font-weight: 600;
        }

        .description {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        /* Formulaire épuré type shadcn/ui */
        .cta-group {
            display: flex;
            gap: 8px;
            margin-bottom: 4rem;
        }

        input {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            outline: none;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 14px;
            border-radius: 8px;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input:focus { border-color: #52525b; }
        input::placeholder { color: #52525b; }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-appearance: none;
        }

        button:hover { opacity: 0.9; }

        /* Section Métriques minimales */
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
